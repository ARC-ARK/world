<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暮城 Dusk City - 雙重世界觀空間架構</title>
  
  <!-- Tailwind CSS 核心 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (讓瀏覽器即時編譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 預設背景，防止載入時閃爍白光 */
    body {
      margin: 0;
      background-color: #0f172a; 
    }
    /* 自訂捲軸樣式 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2); 
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2); 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.4); 
    }
  </style>
</head>
<body>
  <!-- React 應用的掛載點 -->
  <div id="root"></div>

  <!-- React 邏輯 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 自訂的圖標元件 (修復：直接構建 SVG 根節點並映射 Lucide 的子節點 AST)
    const Icon = ({ name, size = 24, className = "" }) => {
      if (!window.lucide || !window.lucide.icons) return null;

      // 安全地獲取圖標定義，支援 PascalCase 與 camelCase
      const getIconDef = (iconName) => {
        if (window.lucide.icons[iconName]) return window.lucide.icons[iconName];
        const camel = iconName.charAt(0).toLowerCase() + iconName.slice(1);
        if (window.lucide.icons[camel]) return window.lucide.icons[camel];
        return null;
      };

      const iconDef = getIconDef(name);
      if (!iconDef) return null;

      // 將 kebab-case 屬性轉換為 React 需要的 camelCase
      const toCamelCase = (str) => {
        if (str.startsWith('data-')) return str;
        return str.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
      };

      // 解析圖標結構並建立 React 元素陣列
      const children = Array.isArray(iconDef) ? iconDef.map(([tag, attrs], index) => {
        const props = { key: index };
        if (attrs) {
          for (const key of Object.keys(attrs)) {
            const reactKey = key === 'class' ? 'className' : toCamelCase(key);
            props[reactKey] = attrs[key];
          }
        }
        return React.createElement(tag, props);
      }) : null;

      // 建立包含基本屬性的 SVG 根元素
      return React.createElement(
        'svg',
        {
          xmlns: 'http://www.w3.org/2000/svg',
          width: size,
          height: size,
          viewBox: '0 0 24 24',
          fill: 'none',
          stroke: 'currentColor',
          strokeWidth: '2',
          strokeLinecap: 'round',
          strokeLinejoin: 'round',
          className: className ? `lucide lucide-${name} ${className}` : `lucide lucide-${name}`
        },
        children
      );
    };

    // 預先生成固定的背景建築與地貌數據，構成高密度的全息地圖視覺
    const bgBuildings = Array.from({ length: 225 }).map((_, i) => ({
      x: (i % 15) * 7 + Math.sin(i) * 2,
      y: Math.floor(i / 15) * 7 + Math.cos(i) * 2,
      w: 1.5 + Math.abs(Math.sin(i * 1.5)) * 4,
      h: 1.5 + Math.abs(Math.cos(i * 2.5)) * 5,
      op: 0.05 + Math.abs(Math.sin(i * 3)) * 0.15
    }));

    const bgShatters = Array.from({ length: 45 }).map((_, i) => ({
      x1: 50 + Math.sin(i * 13) * 60, y1: 50 + Math.cos(i * 17) * 60,
      x2: 50 + Math.cos(i * 11) * 60, y2: 50 + Math.sin(i * 19) * 60,
      op: 0.05 + Math.abs(Math.sin(i)) * 0.25
    }));

    const bgRunes = Array.from({ length: 6 }).map((_, i) => ({
      r: 10 + i * 14,
      dash: `${5 + i * 4}, ${10 + i * 2}`,
      op: 0.05 + (0.05 * (6 - i))
    }));

    const mapData = {
      surface: {
        theme: 'bg-slate-900',
        title: '表世界',
        subtitle: '虛妄的和平與日常',
        color: 'text-blue-400',
        border: 'border-blue-500/30',
        glow: 'shadow-blue-500/50',
        locations: [
          { id: 'w', name: '西區', sub: '學園與高尚住宅區', x: 25, y: 35, icon: 'BookOpen', places: ['聖安德烈私立大學', '半山別墅區', '隱私植物園'], desc: '綠意盎然的富人區與菁英學區。表面上治安優良，實際上是許多高階異族隱藏身分、購置資產（與圈養金絲雀）的安樂窩。百年學府的地下圖書館藏著無人知曉的禁書。' },
          { id: 'c', name: '中區', sub: '霓虹商業區', x: 50, y: 30, icon: 'Building2', places: ['世紀大廈 (企業總部)', '中央車站', '聖安德烈綜合醫院', '雲端景觀酒店'], desc: '權力、財富與謊言的中心。摩天大樓與不夜城交織，白領的修羅場，也是跨界偷渡客最容易隱藏的人海。五星級酒店的高層套房裡，常上演著權力不對等的危險交易。' },
          { id: 'e', name: '東區', sub: '舊城老街', x: 75, y: 35, icon: 'Map', places: ['古董街', '舊神社廢墟', '狹巷無名居酒屋'], desc: '都市歷史遺留的盲區，建築密集且終年不見陽光。充滿線香與霉味，是都市怪談與靈異事件的發源地，也是地下情報最密集的灰色地帶。' },
          { id: 's', name: '南岸', sub: '廢棄工業港區', x: 50, y: 80, icon: 'Navigation', places: ['貨櫃集散地', '廢棄造船廠', '地下黑市拳館'], desc: '遠離市中心的邊緣地帶，佈滿鐵鏽與機油味。幫派火拼、非法走私的溫床，同時也是「清道夫」最常銷毀超自然證據與拋屍的處理場。' },
          { id: 'r', name: '霧川與橋樑', sub: '分隔都市的深邃水脈', x: 50, y: 60, icon: 'Eye', places: ['霧川主幹道', '白霧大橋'], desc: '貫穿整座都市的寬闊河流，水面常年瀰漫不散的濃霧。連結南北岸的橋樑在深夜時常發生無法解釋的「神隱」失蹤案。' },
          { id: 'p', name: '中央警察總局', sub: '表世界秩序的維持者', x: 35, y: 45, icon: 'ShieldAlert', places: ['第七課秘密辦公區', '常規拘留室'], desc: '表面上是維護都市治安的最高機關。但在一般警員接觸不到的深處，隱藏著專門處理超自然案件、負責掩蓋真相的特殊部隊「第七課」。' }
        ]
      },
      boundary: {
        theme: 'bg-indigo-950',
        title: '交界處',
        subtitle: '逢魔時刻的灰暗錨點',
        color: 'text-fuchsia-400',
        border: 'border-fuchsia-500/30',
        glow: 'shadow-fuchsia-500/50',
        locations: [
          { id: 'b1', name: '第13號月台', sub: '入口：中央車站 地下深處', x: 45, y: 35, icon: 'Train', places: ['無人售票機', '幽靈列車'], desc: '觸發條件：凌晨2:44，將沾血硬幣投入特定的舊售票機。濃霧瀰漫的月台永遠停靠著一列無目的地列車，是通往裡世界各階層的地下樞紐。' },
          { id: 'b2', name: '渡鴉酒館', sub: '入口：東區古董街 死胡同底', x: 75, y: 50, icon: 'Wine', places: ['情報吧台', '絕對中立包廂'], desc: '觸發條件：逢魔時刻對紅磚牆敲擊三下。受到古老契約保護的絕對中立安全屋，各方勢力在此用情報、壽命或肉體換取一杯特調。' },
          { id: 'b3', name: 'B4 太平間專用電梯', sub: '入口：聖安德烈綜合醫院', x: 60, y: 25, icon: 'Hospital', places: ['血庫樞紐通道', '暗醫秘密通道'], desc: '觸發條件：刷入高層/暗醫專屬黑卡。電梯將無視物理法則無止盡下沉，直達裡世界的醫療黑市，生與死、救贖與獵食的灰色通道。' },
          { id: 'b4', name: '零號證物室／收容所', sub: '入口：中央警察總局 地下', x: 35, y: 25, icon: 'ShieldAlert', places: ['封印大門', '臨時拘留室'], desc: '觸發條件：第七課特勤探員的專屬密碼。刻滿防禦魔法陣的合金大門，跨界逮捕、私下審訊與無情遣返危險異族的官方秘密通道。' },
          { id: 'b5', name: '白霧大橋 (異化)', sub: '入口：霧川之上', x: 50, y: 65, icon: 'Ghost', places: ['境界線裂縫', '血月荒原邊緣'], desc: '觸發條件：起大霧的深夜獨自過橋且絕對不可回頭。走過橋的另一端，繁華的現代夜景將瞬間剝落，直接踏入裡世界充滿瘴氣的邊緣地帶。' },
          { id: 'b6', name: '零號當鋪', sub: '入口：隨機顯現的深巷', x: 25, y: 55, icon: 'Activity', places: ['契約交易臺', '靈魂典當庫'], desc: '觸發條件：在極度絕望與渴求的狀態下迷路。看似賣古董的小店，什麼都收，什麼都賣。人類在此典當「壽命」、「記憶」或「身體使用權」來換取奇蹟。' }
        ]
      },
      inner: {
        theme: 'bg-red-950',
        title: '裡世界',
        subtitle: '慾望、血統與深淵',
        color: 'text-red-500',
        border: 'border-red-500/30',
        glow: 'shadow-red-500/50',
        locations: [
          { id: 'i1', name: '猩紅高地', sub: '上層領地', x: 50, y: 15, icon: 'Moon', places: ['純血貴族城堡群', '鮮血薔薇園'], desc: '懸浮於半空的哥德式建築群。純血吸血鬼與高等惡魔的專屬領地，極度奢華且冰冷，人類在此僅是被精心圈養的珍饈或專屬血奴。' },
          { id: 'i2', name: '永夜花街與市集', sub: '中層不夜城', x: 25, y: 40, icon: 'Wine', places: ['極樂樓', '迷幻香料館', '黑市拍賣行'], desc: '永遠閃爍迷幻霓虹的享樂區。魅魔、妖狐聚集的銷金窟，空氣中瀰漫催情薰香，是跨越道德邊界的極致放縱之地。' },
          { id: 'i3', name: '鐵血邊界站', sub: '中層執法區', x: 45, y: 35, icon: 'ShieldAlert', places: ['兩界海關', '審訊高塔'], desc: '對接警察總局零號門。駐紮著兩界全副武裝的執法官，審查簽證，並無情鎮壓任何企圖非法偷渡或破壞兩界協議的危險種。' },
          { id: 'i4', name: '深淵療養院', sub: '中層醫療區', x: 70, y: 35, icon: 'Activity', places: ['地下血市', '肢體改造室', '契約病房'], desc: '對接聖安德烈醫院B4電梯。提供異種專屬的黑魔法治療，同時也是都市最大的合法血液與活體器官交易中心，付不出醫藥費只能用肉體償還。' },
          { id: 'i5', name: '荊棘廢土與鬥技場', sub: '底層流放地', x: 50, y: 80, icon: 'Skull', places: ['地下鬥技場', '罪人礦坑'], desc: '充滿瘴氣與血腥味的荒蕪之地。無規則生死搏鬥的野蠻舞台，高層貴族常來此觀賞殺戮，戰敗者將直接淪為拍賣台上的禁臠與奴隸。' },
          { id: 'i6', name: '迷霧暗林', sub: '邊緣狩獵場', x: 75, y: 65, icon: 'Eye', places: ['獸族領地', '月光祭壇', '禁忌之泉'], desc: '終年籠罩在迷霧與幽暗中的原始森林，狼人與高階魔獸的棲息地。崇尚絕對的野蠻與弱肉強食，常有異族在此舉辦殘酷的「人類狩獵祭」。' }
        ]
      }
    };

    function DuskCityMap() {
      const [activeLayer, setActiveLayer] = useState('surface');
      const [selectedLoc, setSelectedLoc] = useState(mapData.surface.locations[1]); // Default to Central

      const handleLayerSwitch = (layer) => {
        setActiveLayer(layer);
        setSelectedLoc(mapData[layer].locations[0]);
      };

      const layerInfo = mapData[activeLayer];

      return (
        <div className={`min-h-screen ${layerInfo.theme} text-gray-100 p-4 md:p-8 font-sans transition-colors duration-700 flex flex-col`}>
          {/* Header */}
          <div className="max-w-6xl mx-auto w-full mb-8">
            <h1 className="text-4xl md:text-5xl font-bold tracking-wider mb-2 text-white drop-shadow-lg flex items-center gap-4">
              <span className={`text-3xl md:text-4xl font-bold opacity-90 ${layerInfo.color}`}>[ 雙重世界觀空間架構 ]</span>
            </h1>
            <p className="text-gray-400 text-lg tracking-widest">陣營導覽與地點檢索系統</p>
          </div>

          {/* Navigation Controls */}
          <div className="max-w-6xl mx-auto w-full flex space-x-2 md:space-x-4 mb-6 relative z-10">
            {[
              { id: 'surface', label: '表世界', clr: 'hover:border-blue-400 hover:text-blue-300', activeClr: 'bg-blue-900/50 border-blue-400 text-blue-300 shadow-[0_0_15px_rgba(59,130,246,0.5)]' },
              { id: 'boundary', label: '交界處', clr: 'hover:border-fuchsia-400 hover:text-fuchsia-300', activeClr: 'bg-fuchsia-900/50 border-fuchsia-400 text-fuchsia-300 shadow-[0_0_15px_rgba(217,70,239,0.5)]' },
              { id: 'inner', label: '裡世界', clr: 'hover:border-red-400 hover:text-red-300', activeClr: 'bg-red-900/50 border-red-400 text-red-300 shadow-[0_0_15px_rgba(239,68,68,0.5)]' }
            ].map((btn) => (
              <button
                key={btn.id}
                onClick={() => handleLayerSwitch(btn.id)}
                className={`px-6 py-3 border-b-2 font-medium tracking-widest transition-all duration-300 ${
                  activeLayer === btn.id ? btn.activeClr : `border-transparent text-gray-500 ${btn.clr}`
                }`}
              >
                {btn.label}
              </button>
            ))}
          </div>

          {/* Main Content Area */}
          <div className="max-w-6xl mx-auto w-full flex flex-col lg:flex-row gap-6 lg:gap-8 flex-grow">
            
            {/* Map Visualization */}
            <div className={`relative w-full lg:w-2/3 bg-black/40 rounded-2xl border ${layerInfo.border} overflow-hidden min-h-[450px] shadow-2xl transition-all duration-500`}>
              
              {/* 細節化 SVG 建築與地貌背景 */}
              <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}>
                {/* 基礎網格 (僅表世界顯示) */}
                <defs>
                  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth="1"/>
                  </pattern>
                  <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
                    <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.015)" strokeWidth="0.5"/>
                  </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" className={`transition-opacity duration-700 ${activeLayer === 'surface' ? 'opacity-100' : 'opacity-0'}`} />
                <rect width="100%" height="100%" fill="url(#smallGrid)" className={`transition-opacity duration-700 ${activeLayer === 'surface' ? 'opacity-100' : 'opacity-0'}`} />

                {/* 表世界：高密度都市建築群 */}
                <g className={`transition-opacity duration-700 ${activeLayer === 'surface' ? 'opacity-100' : 'opacity-0'}`}>
                  {bgBuildings.map((b, i) => (
                    <rect key={`b-${i}`} x={`${b.x}%`} y={`${b.y}%`} width={`${b.w}%`} height={`${b.h}%`} 
                          fill={`rgba(59, 130, 246, ${b.op})`} stroke={`rgba(59, 130, 246, ${b.op * 2})`} strokeWidth="1" rx="1" />
                  ))}
                </g>

                {/* 交界處：空間裂痕與破碎碎片 */}
                <g className={`transition-opacity duration-700 ${activeLayer === 'boundary' ? 'opacity-100' : 'opacity-0'}`}>
                  {bgShatters.map((s, i) => (
                    <line key={`s-${i}`} x1={`${s.x1}%`} y1={`${s.y1}%`} x2={`${s.x2}%`} y2={`${s.y2}%`}
                          stroke={`rgba(217, 70, 239, ${s.op})`} strokeWidth={1 + Math.abs(Math.sin(i))} 
                          style={{ filter: 'drop-shadow(0 0 4px rgba(217,70,239,0.5))' }} />
                  ))}
                  <polygon points="20%,30% 25%,25% 22%,40%" fill="rgba(217,70,239,0.1)" stroke="rgba(217,70,239,0.2)" />
                  <polygon points="70%,60% 80%,55% 75%,75%" fill="rgba(217,70,239,0.1)" stroke="rgba(217,70,239,0.2)" />
                  <polygon points="40%,80% 50%,70% 45%,90%" fill="rgba(217,70,239,0.1)" stroke="rgba(217,70,239,0.2)" />
                </g>

                {/* 裡世界：深淵巨型法陣與崎嶇地形 */}
                <g className={`transition-opacity duration-700 ${activeLayer === 'inner' ? 'opacity-100' : 'opacity-0'}`}>
                  <circle cx="50%" cy="50%" r="48%" fill="none" stroke="rgba(239, 68, 68, 0.03)" strokeWidth="30" />
                  {bgRunes.map((r, i) => (
                    <circle key={`r-${i}`} cx="50%" cy="50%" r={`${r.r}%`} fill="none" 
                            stroke={`rgba(239, 68, 68, ${r.op})`} strokeWidth="2" strokeDasharray={r.dash} />
                  ))}
                  <path d="M 0 80 Q 20 70 40 85 T 80 75 T 100 85 L 100 100 L 0 100 Z" fill="rgba(127, 29, 29, 0.2)" />
                  <path d="M 0 90 Q 30 80 60 95 T 100 85 L 100 100 L 0 100 Z" fill="rgba(69, 10, 10, 0.4)" />
                </g>
              </svg>

              {/* 河流 (僅表世界與交界處顯示) */}
              {(activeLayer === 'surface' || activeLayer === 'boundary') && (
                <div className={`absolute left-0 right-0 h-16 top-[60%] -translate-y-1/2 opacity-30 ${activeLayer === 'surface' ? 'bg-cyan-500' : 'bg-fuchsia-800 blur-lg'} transform -skew-y-3 transition-colors duration-700 pointer-events-none z-0`} />
              )}
              {activeLayer === 'inner' && (
                <div className="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-red-900/40 to-transparent pointer-events-none z-0" />
              )}

              {/* 圖層提示標題 */}
              <div className="absolute top-4 left-4 pointer-events-none z-30">
                <h2 className={`text-2xl font-bold ${layerInfo.color} opacity-90 uppercase tracking-widest flex items-center gap-2`}>
                  <Icon name="MapPin" size={24} />
                  {layerInfo.title}
                </h2>
                <p className="text-gray-400 text-sm mt-1">{layerInfo.subtitle}</p>
              </div>

              {/* 地圖節點 */}
              {layerInfo.locations.map((loc) => {
                const isSelected = selectedLoc?.id === loc.id;
                return (
                  <button
                    key={loc.id}
                    onClick={() => setSelectedLoc(loc)}
                    className="absolute transform -translate-x-1/2 -translate-y-1/2 group z-20"
                    style={{ left: `${loc.x}%`, top: `${loc.y}%` }}
                  >
                    <div className="relative flex flex-col items-center">
                      <div className={`w-12 h-12 rounded-full flex items-center justify-center transition-all duration-300 ${
                        isSelected 
                          ? `bg-gray-900 border-2 ${layerInfo.border} ${layerInfo.color} shadow-[0_0_25px_rgba(currentColor)] scale-110` 
                          : `bg-gray-800/80 text-gray-400 border border-gray-600 hover:${layerInfo.color} hover:border-current hover:scale-105`
                      }`}>
                        <Icon name={loc.icon} size={24} />
                      </div>
                      
                      {/* 節點標籤 */}
                      <div className={`mt-3 px-3 py-1.5 bg-black/90 backdrop-blur-md rounded border ${isSelected ? layerInfo.border + ' ' + layerInfo.color : 'border-gray-700 text-gray-300'} whitespace-nowrap text-sm font-bold tracking-wide transition-colors shadow-lg`}>
                        {loc.name}
                      </div>
                      
                      {/* 選擇時的波紋動畫 */}
                      {isSelected && (
                        <div className={`absolute inset-0 rounded-full border-2 ${layerInfo.border} animate-ping opacity-75 pointer-events-none`} />
                      )}
                    </div>
                  </button>
                );
              })}
            </div>

            {/* 右側細節面板 */}
            <div className={`w-full lg:w-1/3 bg-black/50 rounded-2xl border ${layerInfo.border} p-6 flex flex-col relative overflow-hidden backdrop-blur-md shadow-xl transition-all duration-500`}>
              {/* 背景微光 */}
              <div className={`absolute -top-20 -right-20 w-72 h-72 rounded-full ${layerInfo.color} opacity-10 blur-3xl`} />
              
              {selectedLoc ? (
                <div className="relative z-10 flex-grow flex flex-col">
                  <div className="flex items-center gap-3 mb-1">
                    <Icon name={selectedLoc.icon} size={32} className={layerInfo.color} />
                    <h3 className="text-3xl font-bold text-white tracking-wide">{selectedLoc.name}</h3>
                  </div>
                  <h4 className={`text-lg font-medium ${layerInfo.color} mb-6 opacity-90 tracking-wide`}>{selectedLoc.sub}</h4>
                  
                  <div className="mb-6 bg-black/40 p-4 rounded-xl border border-gray-800/50">
                    <p className="text-gray-300 leading-relaxed text-base text-justify">{selectedLoc.desc}</p>
                  </div>

                  {selectedLoc.places.length > 0 && (
                    <div className="mt-auto">
                      <h5 className="text-sm uppercase tracking-widest text-gray-400 mb-3 font-semibold border-b border-gray-800 pb-2 flex items-center gap-2">
                        <Icon name="MapPin" size={16} /> 區域內重要節點
                      </h5>
                      <ul className="grid grid-cols-1 gap-2.5">
                        {selectedLoc.places.map((place, idx) => (
                          <li key={idx} className={`bg-gray-900/60 border border-gray-700/50 rounded-lg p-3 flex items-center gap-3 text-gray-200 hover:${layerInfo.border} hover:bg-black/80 transition-all cursor-default shadow-sm`}>
                            <div className={`w-2 h-2 rounded-full ${layerInfo.theme.replace('bg-', 'bg-').replace('-900', '-400').replace('-950', '-400')}`} style={{ boxShadow: '0 0 8px currentColor' }} />
                            <span className="font-medium tracking-wide">{place}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              ) : (
                <div className="flex-grow flex items-center justify-center text-gray-500">
                  請選擇地圖上的節點以查看詳情
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // 啟動 React 應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DuskCityMap />);
  </script>
</body>
</html>
